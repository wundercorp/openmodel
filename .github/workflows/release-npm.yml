name: Release npm packages

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run release:publish -- --provenance --require-tag-match
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
