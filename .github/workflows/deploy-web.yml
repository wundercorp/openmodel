name: Deploy website

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["apps/web/**", "deploy/docker/web.Dockerfile", "deploy/docker/nginx.conf"]

permissions:
  contents: read
  packages: write

jobs:
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/web.Dockerfile
          push: true
          tags: ghcr.io/wundercorp/openmodel-web:${{ github.sha }},ghcr.io/wundercorp/openmodel-web:latest
