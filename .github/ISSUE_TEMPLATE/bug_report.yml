name: Bug report
description: Report reproducible component behavior or styling defects
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what should have happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: 0.1.0
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide a minimal repository, sandbox, or exact steps.
    validations:
      required: true
  - type: dropdown
    id: theme
    attributes:
      label: Theme
      options: [Light, Dark, System, All]
    validations:
      required: true
  - type: textarea
    id: accessibility
    attributes:
      label: Accessibility impact
      description: Include keyboard, screen reader, zoom, contrast, or motion details when relevant.
