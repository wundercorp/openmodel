name: Feature request
description: Propose a component, API, token, or documentation improvement
title: "[Proposal]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the product problem rather than only the preferred solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behavior
    validations:
      required: true
  - type: textarea
    id: accessibility
    attributes:
      label: Accessibility considerations
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
