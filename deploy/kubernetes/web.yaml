apiVersion: apps/v1
kind: Deployment
metadata:
  name: openmodel-web
  labels:
    app.kubernetes.io/name: openmodel-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: openmodel-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openmodel-web
    spec:
      containers:
        - name: web
          image: ghcr.io/wundercorp/openmodel-web:latest
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: openmodel-web
spec:
  selector:
    app.kubernetes.io/name: openmodel-web
  ports:
    - name: http
      port: 80
      targetPort: http
